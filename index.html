<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dalla web app alla classe — La governance umana del design didattico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Sans+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blu:#123E90;
  --blu-light:#E8EDF8;
  --blu-soft:#F2F5FB;
  --blu-dark:#0A2A66;
  --ink:#1A1F2E;
  --ink-soft:#5A6378;
  --ink-faint:#9098A8;
  --paper:#FDFCFA;
  --paper-warm:#F4F1ED;
  --line:#DDE2EB;
  --line-soft:#EAEDF3;
  --amber:#D89030;
  --amber-light:#FDF3DE;
  --green:#2D8B5B;
  --green-light:#E3F1E9;
  --rust:#B84A2A;
  --rust-light:#FCEBE3;
  --highlight:#FFF3C4;
  --shadow:0 2px 8px rgba(18,62,144,.06);
  --shadow-md:0 6px 22px rgba(18,62,144,.10);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'IBM Plex Sans',system-ui,sans-serif;
  background:var(--paper-warm);
  color:var(--ink);
  font-size:16px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

/* =============== STAGE =============== */
.stage{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:var(--paper);
}

.deck{
  flex:1;
  position:relative;
  overflow:hidden;
}

.slide{
  position:absolute;inset:0;
  display:flex;
  opacity:0;
  pointer-events:none;
  transition:opacity .35s ease;
  background:var(--paper);
}
.slide.active{opacity:1;pointer-events:auto;}

/* =============== COVER & FINAL =============== */
.slide.full{
  flex-direction:column;
  align-items:center;justify-content:center;
  padding:6vh 8vw;
  text-align:left;
}
.slide.full .full-inner{
  width:100%;max-width:1200px;
}
.eyebrow-full{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-weight:600;
  font-size:14px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--blu);
  margin-bottom:32px;
  display:flex;align-items:center;gap:14px;
}
.eyebrow-full::before{
  content:'';width:36px;height:2px;background:var(--blu);display:inline-block;
}
.cover-title{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-weight:700;
  font-size:clamp(48px,7vw,96px);
  line-height:1.02;
  color:var(--ink);
  letter-spacing:-.02em;
  margin-bottom:28px;
}
.cover-title em{
  font-style:normal;
  color:var(--blu);
  font-family:'IBM Plex Sans',serif;
  font-weight:600;
  font-style:italic;
}
.cover-sub{
  font-size:clamp(20px,2vw,26px);
  font-weight:400;
  color:var(--ink-soft);
  line-height:1.4;
  max-width:880px;
  margin-bottom:48px;
}
.cover-meta{
  display:flex;flex-wrap:wrap;gap:20px 48px;
  padding-top:32px;
  border-top:1px solid var(--line);
  font-size:15px;
  color:var(--ink-soft);
}
.cover-meta div{display:flex;flex-direction:column;gap:4px;}
.cover-meta strong{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--ink-faint);
  font-weight:600;
}
.cover-meta span{color:var(--ink);font-weight:500;font-size:16px;}

/* =============== SPLIT LAYOUT =============== */
.slide.split{
  display:grid;
  grid-template-columns:1fr 1fr;
}
.pane{
  height:100vh;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.pane.left{
  background:var(--paper);
  border-right:1px solid var(--line-soft);
  padding:48px 56px 80px 64px;
}
.pane.right{
  background:linear-gradient(180deg,var(--paper) 0%,var(--blu-soft) 100%);
  padding:48px 64px 80px 56px;
}

/* =============== CHAT =============== */
.chat-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:28px;
  padding-bottom:18px;
  border-bottom:1px solid var(--line-soft);
}
.chat-head-dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--green);
}
.chat-head-label{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:12px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--ink-faint);
  font-weight:600;
}
.chat-head-counter{
  margin-left:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:var(--ink-faint);
}

.chat-thread{
  flex:1;
  display:flex;flex-direction:column;gap:18px;
  overflow-y:auto;
  padding-right:8px;
  scroll-behavior:smooth;
}
.chat-thread::-webkit-scrollbar{width:6px;}
.chat-thread::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}

.msg-row{
  display:flex;gap:12px;
  align-items:flex-end;
  animation:fadeUp .5s ease both;
}
.msg-row.user{justify-content:flex-end;}
.msg-row.user .avatar{order:2;}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

.avatar{
  width:32px;height:32px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-weight:600;
  font-size:13px;
  flex-shrink:0;
  letter-spacing:.02em;
}
.avatar.andrea{
  background:var(--blu);
  color:#fff;
}
.avatar.claude{
  background:#2A2F3D;
  color:#fff;
}

.bubble{
  max-width:78%;
  padding:16px 20px;
  border-radius:18px;
  font-size:16px;
  line-height:1.55;
  position:relative;
}
.bubble.from-user{
  background:var(--blu);
  color:#fff;
  border-bottom-right-radius:6px;
}
.bubble.from-ai{
  background:#fff;
  color:var(--ink);
  border:1px solid var(--line);
  border-bottom-left-radius:6px;
}
.bubble.thinking{
  background:transparent;
  border:none;
  border-left:2px solid var(--blu);
  border-radius:0;
  padding:6px 14px;
  font-style:italic;
  font-size:14px;
  color:var(--ink-soft);
  max-width:88%;
}
.bubble.thinking::before{
  content:'pensiero';
  display:block;
  font-style:normal;
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:10px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--blu);
  font-weight:600;
  margin-bottom:4px;
}
.bubble.narration{
  background:var(--paper-warm);
  color:var(--ink-soft);
  border:1px dashed var(--line);
  font-style:italic;
  text-align:center;
  max-width:100%;
  font-size:15px;
}
.bubble strong{font-weight:600;}
.bubble em.hl{
  font-style:normal;
  background:var(--highlight);
  padding:0 4px;
  border-radius:3px;
  color:var(--ink);
}
.bubble.from-user em.hl{
  background:rgba(255,243,196,.35);
  color:#fff;
  border-bottom:1px dotted rgba(255,255,255,.5);
}
.bubble small.tag{
  display:block;
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:600;
  margin-bottom:6px;
  opacity:.7;
}
.bubble.from-ai small.tag{color:var(--blu);}

.msg-row.divider{
  display:flex;align-items:center;gap:14px;
  padding:8px 0;
}
.msg-row.divider::before,.msg-row.divider::after{
  content:'';flex:1;height:1px;background:var(--line-soft);
}
.msg-row.divider span{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:11px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--ink-faint);
  font-weight:600;
}

/* =============== RIGHT PANE — VISUAL =============== */
.visual-head{
  display:flex;align-items:center;gap:14px;
  margin-bottom:22px;
}
.visual-eyebrow{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:12px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--blu);
  font-weight:700;
}
.visual-eyebrow .num{
  display:inline-block;
  background:var(--blu);
  color:#fff;
  padding:2px 8px;
  border-radius:3px;
  margin-right:10px;
  letter-spacing:.08em;
}
.visual-title{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:clamp(28px,3vw,42px);
  font-weight:700;
  line-height:1.08;
  color:var(--ink);
  letter-spacing:-.01em;
  margin-bottom:24px;
}
.visual-title em{
  color:var(--blu);
  font-style:normal;
}

.visual-body{
  flex:1;
  display:flex;flex-direction:column;justify-content:center;
  gap:20px;
}

.highlight-box{
  margin-top:auto;
  background:#fff;
  border-left:4px solid var(--blu);
  padding:16px 20px;
  border-radius:0 8px 8px 0;
  box-shadow:var(--shadow);
  font-size:16px;
  line-height:1.45;
  color:var(--ink);
}
.highlight-box .hb-label{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:10px;
  letter-spacing:.18em;
  text-transform:uppercase;
  font-weight:700;
  color:var(--blu);
  display:block;
  margin-bottom:6px;
}

/* =============== NAV =============== */
.nav{
  height:56px;
  background:#fff;
  border-top:1px solid var(--line);
  display:flex;align-items:center;
  padding:0 32px;
  gap:12px;
  flex-shrink:0;
}
.nav-btn{
  width:36px;height:36px;
  border-radius:6px;
  border:1px solid var(--line);
  background:#fff;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-soft);
  transition:all .15s;
}
.nav-btn:hover{
  background:var(--blu);
  color:#fff;
  border-color:var(--blu);
}
.nav-btn:disabled{
  opacity:.3;cursor:default;
}
.nav-btn:disabled:hover{background:#fff;color:var(--ink-soft);border-color:var(--line);}
.nav-btn svg{width:18px;height:18px;}

.nav-progress{
  flex:1;
  display:flex;align-items:center;gap:6px;
  padding:0 16px;
}
.dot{
  width:8px;height:8px;
  border-radius:50%;
  background:var(--line);
  cursor:pointer;
  transition:all .2s;
  flex-shrink:0;
}
.dot:hover{background:var(--ink-faint);}
.dot.active{
  background:var(--blu);
  width:24px;border-radius:4px;
}
.dot.passed{background:var(--blu-light);border:1px solid var(--blu);}

.nav-counter{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:var(--ink-soft);
  margin-right:8px;
}
.nav-title{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:13px;
  font-weight:600;
  color:var(--ink);
  letter-spacing:.02em;
  white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  max-width:380px;
}

.nav-fs{
  margin-left:auto;
}

/* =============== VISUAL ATOMS =============== */
.flow-row{
  display:flex;align-items:center;gap:14px;
}
.flow-node{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  padding:14px 18px;
  text-align:center;
  min-width:130px;
  box-shadow:var(--shadow);
  font-weight:500;
}
.flow-node.alert{
  border:2px solid var(--blu);
  background:var(--blu-light);
  color:var(--blu-dark);
  font-weight:600;
  position:relative;
}
.flow-node .nlabel{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;
  margin-bottom:4px;
}
.flow-node.alert .nlabel{color:var(--blu);}
.flow-arrow{
  flex:1;height:2px;
  background:linear-gradient(90deg,var(--blu) 0%,var(--blu) 100%);
  position:relative;min-width:30px;
}
.flow-arrow::after{
  content:'';position:absolute;right:-2px;top:-5px;
  width:0;height:0;
  border-left:8px solid var(--blu);
  border-top:6px solid transparent;border-bottom:6px solid transparent;
}
.flow-arrow.dashed{
  background:repeating-linear-gradient(90deg,var(--blu) 0 6px,transparent 6px 12px);
}
.flow-arrow.return{
  margin-top:-2px;
}

.metric-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.metric{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  padding:18px 20px;
  box-shadow:var(--shadow);
}
.metric.warn{border-left:4px solid var(--amber);}
.metric.good{border-left:4px solid var(--green);}
.metric .mlabel{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;
  margin-bottom:8px;
}
.metric .mvalue{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:32px;font-weight:700;color:var(--ink);
  line-height:1.05;
  margin-bottom:6px;
}
.metric .mdesc{
  font-size:14px;color:var(--ink-soft);line-height:1.4;
}

.stack-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:10px;
  padding:16px 20px;
  box-shadow:var(--shadow);
  display:flex;gap:16px;align-items:flex-start;
}
.stack-card .sc-num{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:24px;font-weight:700;color:var(--blu);
  flex-shrink:0;
  min-width:34px;
  line-height:1;
  padding-top:2px;
}
.stack-card .sc-content{flex:1;}
.stack-card .sc-title{
  font-weight:600;
  font-size:15px;
  margin-bottom:4px;
}
.stack-card .sc-desc{
  font-size:14px;color:var(--ink-soft);line-height:1.45;
}
.stack-card.crit{border-left:4px solid var(--amber);}
.stack-card.crit .sc-num{color:var(--amber);}

.compare{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.compare-side{
  padding:22px 24px;
}
.compare-side.a{
  background:#FAFAF7;
  border-right:1px solid var(--line-soft);
}
.compare-side.b{
  background:var(--blu-light);
}
.compare-side .cs-label{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  font-weight:700;
  margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.compare-side.a .cs-label{color:var(--ink-faint);}
.compare-side.b .cs-label{color:var(--blu);}
.compare-side .cs-label::before{
  content:'';width:18px;height:2px;background:currentColor;
}
.compare-side ul{
  list-style:none;
  font-size:15px;
  line-height:1.5;
}
.compare-side li{
  padding:6px 0;
  padding-left:18px;
  position:relative;
}
.compare-side li::before{
  content:'';position:absolute;left:0;top:14px;
  width:8px;height:1px;background:currentColor;
  opacity:.5;
}
.compare-side.a li{color:var(--ink-soft);}
.compare-side.b li{color:var(--ink);font-weight:500;}

.big-quote{
  text-align:center;
  padding:32px 24px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  box-shadow:var(--shadow-md);
}
.big-quote .bq-label{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-faint);
  font-weight:600;
  margin-bottom:14px;
}
.big-quote .bq-text{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:clamp(24px,2.6vw,36px);
  font-weight:600;
  line-height:1.18;
  color:var(--ink);
  font-style:italic;
}
.big-quote .bq-text strong{
  color:var(--blu);
  font-style:normal;
  font-weight:700;
}
.versus{
  display:flex;align-items:center;justify-content:center;
  gap:24px;
  margin:24px 0;
}
.versus-side{
  padding:18px 28px;
  border-radius:10px;
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-weight:700;
  font-size:20px;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.versus-side.win{
  background:var(--blu);color:#fff;
  font-size:24px;
  box-shadow:var(--shadow-md);
}
.versus-side.lose{
  background:#F2F2EF;color:var(--ink-faint);
  text-decoration:line-through;
  text-decoration-thickness:2px;
}
.versus-sep{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-weight:700;
  color:var(--blu);
  font-size:24px;
}

.steplist{
  display:flex;flex-direction:column;
  gap:8px;
}
.step{
  display:flex;align-items:center;gap:14px;
  padding:10px 14px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  font-size:14px;
  line-height:1.4;
}
.step .stepn{
  width:26px;height:26px;
  background:var(--blu-light);
  color:var(--blu);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;font-weight:600;
  flex-shrink:0;
}
.step.heart{
  border-color:var(--blu);
  background:var(--blu-light);
}
.step.heart .stepn{
  background:var(--blu);color:#fff;
}
.step.heart .step-text{font-weight:600;}

.laptop-mock{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:18px;
  box-shadow:var(--shadow-md);
}
.laptop-mock .lm-label{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--ink-faint);
  margin-bottom:10px;
  display:flex;justify-content:space-between;
}
.lm-screen{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:10px;
  background:var(--paper-warm);
  border-radius:8px;
  padding:14px;
}
.lm-side{
  background:#fff;
  border:1px solid var(--line-soft);
  border-radius:6px;
  padding:10px;
  font-size:11px;
  color:var(--ink-soft);
  min-height:140px;
}
.lm-side strong{
  display:block;
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--blu);
  margin-bottom:6px;
  font-weight:600;
}
.lm-side ul{list-style:none;font-size:11px;line-height:1.5;}
.lm-side li{padding:2px 0;}
.lm-phone{
  width:88px;
  background:var(--ink);
  border-radius:14px;
  padding:6px 4px;
  display:flex;flex-direction:column;
  gap:4px;
  align-self:center;
}
.lm-phone-screen{
  background:#fff;
  border-radius:8px;
  height:160px;
  padding:6px;
  font-size:9px;
  color:var(--ink-soft);
  display:flex;flex-direction:column;gap:4px;
}
.lm-phone-msg{
  background:var(--blu-light);
  padding:4px 6px;
  border-radius:4px;
  font-size:8px;
  line-height:1.3;
  color:var(--ink);
}
.lm-tags{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:14px;
}
.lm-tag{
  background:var(--blu);
  color:#fff;
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:10px;
  letter-spacing:.06em;
  padding:3px 9px;
  border-radius:10px;
  font-weight:500;
}

.tag-cloud{
  display:flex;flex-wrap:wrap;gap:8px;
}
.tag-chip{
  font-family:'IBM Plex Sans Condensed',sans-serif;
  font-size:13px;
  font-weight:500;
  padding:6px 12px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--ink-soft);
}
.tag-chip.on{
  border-color:var(--green);
  background:var(--green-light);
  color:var(--green);
  font-weight:600;
}
.tag-chip.on::before{
  content:'✓ ';
  font-weight:700;
}

.archx{

// =============== RENDER ===============
const deck = document.getElementById('deck');
const counter = document.getElementById('counter');
const navTitleEl = document.getElementById('navTitle');
const progress = document.getElementById('progress');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const fsBtn = document.getElementById('fsBtn');
const menuBtn = document.getElementById('menuBtn');
const menu = document.getElementById('menu');
const menuBackdrop = document.getElementById('menuBackdrop');
const menuList = document.getElementById('menuList');

function renderSlide(s, idx){
  const el = document.createElement('div');
  el.className = 'slide ' + s.type;
  el.dataset.idx = idx;

  if(s.type === 'full'){
    el.innerHTML = s.html;
  } else {
    // split
    const num = String(idx).padStart(2,'0');
    const chatHtml = s.chat.map(m => {
      if(m.role === 'thinking'){
        return `<div class="msg-row"><div class="bubble thinking">${m.text}</div></div>`;
      }
      if(m.role === 'narration'){
        return `<div class="msg-row"><div class="bubble narration">${m.text}</div></div>`;
      }
      const isUser = m.role === 'user';
      const avatarClass = isUser ? 'andrea' : 'claude';
      const avatarLetter = isUser ? 'A' : 'C';
      const rowClass = isUser ? 'user' : 'ai';
      const bubbleClass = isUser ? 'from-user' : 'from-ai';
      return `<div class="msg-row ${rowClass}">
        <div class="avatar ${avatarClass}">${avatarLetter}</div>
        <div class="bubble ${bubbleClass}">${m.text}</div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="pane left">
        <div class="chat-head">
          <span class="chat-head-dot"></span>
          <span class="chat-head-label">chat · Andrea ↔ Claude</span>
          <span class="chat-head-counter">scena ${num}</span>
        </div>
        <div class="chat-thread">${chatHtml}</div>
      </div>
      <div class="pane right">
        <div class="visual-head">
          <div class="visual-eyebrow"><span class="num">${num}</span>${s.eyebrow.replace(/Punto \d+/,'').replace(/^\s*[—-]\s*/,'') || s.eyebrow}</div>
        </div>
        <h2 class="visual-title">${s.title}</h2>
        ${s.visualHtml}
      </div>
    `;
  }
  deck.appendChild(el);
}

SLIDES.forEach(renderSlide);

// progress dots
SLIDES.forEach((s,i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.title = s.navTitle;
  d.onclick = () => go(i);
  progress.appendChild(d);
});

// menu items
SLIDES.forEach((s,i) => {
  const it = document.createElement('div');
  it.className = 'menu-item';
  it.innerHTML = `<span class="mi-num">${String(i).padStart(2,'0')}</span><span>${s.navTitle}</span>`;
  it.onclick = () => { go(i); closeMenu(); };
  menuList.appendChild(it);
});

let cur = 0;
function go(i){
  if(i < 0 || i >= SLIDES.length) return;
  cur = i;
  document.querySelectorAll('.slide').forEach((s,idx) => {
    s.classList.toggle('active', idx === cur);
  });
  document.querySelectorAll('.dot').forEach((d,idx) => {
    d.classList.toggle('active', idx === cur);
    d.classList.toggle('passed', idx < cur);
  });
  document.querySelectorAll('.menu-item').forEach((m,idx) => {
    m.classList.toggle('active', idx === cur);
  });
  counter.textContent = String(cur+1).padStart(2,'0') + ' / ' + String(SLIDES.length).padStart(2,'0');
  navTitleEl.textContent = SLIDES[cur].navTitle;
  prevBtn.disabled = cur === 0;
  nextBtn.disabled = cur === SLIDES.length-1;

  // scroll chat to top each time
  const active = document.querySelector('.slide.active .chat-thread');
  if(active) active.scrollTop = 0;
}

prevBtn.onclick = () => go(cur-1);
nextBtn.onclick = () => go(cur+1);

document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); go(cur+1); }
  else if(e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(cur-1); }
  else if(e.key === 'Home') { e.preventDefault(); go(0); }
  else if(e.key === 'End') { e.preventDefault(); go(SLIDES.length-1); }
  else if(e.key === 'f' || e.key === 'F') { toggleFs(); }
  else if(e.key === 'Escape') { closeMenu(); }
});

function toggleFs(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}
fsBtn.onclick = toggleFs;

function openMenu(){ menu.classList.add('open'); menuBackdrop.classList.add('show'); }
function closeMenu(){ menu.classList.remove('open'); menuBackdrop.classList.remove('show'); }
menuBtn.onclick = () => menu.classList.contains('open') ? closeMenu() : openMenu();
menuBackdrop.onclick = closeMenu;

go(0);
</script>
